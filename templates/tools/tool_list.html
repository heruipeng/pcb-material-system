{% extends 'base.html' %}
{% block title %}工具管理{% endblock %}

{% block content %}
<div class="filter-card">
    <div class="filter-row">
        <div class="filter-item">
            <label>关键字：</label>
            <input type="text" id="searchKeyword" placeholder="工具名称" style="width:200px;">
        </div>
        <div class="filter-item">
            <label>类型：</label>
            <select id="searchType" style="width:150px;">
                <option value="">全部</option>
                <option value="fly_probe">飞针测试</option>
                <option value="impedance">阻抗测试</option>
                <option value="aoi">AOI检测</option>
                <option value="xray">X-Ray检测</option>
                <option value="ict">ICT测试</option>
                <option value="functional">功能测试</option>
                <option value="other">其他</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="doSearch()">查询</button>
        <button class="btn btn-default" onclick="doReset()">重置</button>
    </div>
</div>

<div class="filter-card" style="display:flex;flex-wrap:wrap;gap:16px;">
    {% for tool in tools %}
    <a href="/tools/{{ tool.id }}/" style="flex:1;min-width:160px;text-decoration:none;color:inherit;">
        <div style="background:#fff;border:1px solid #EBEEF5;border-radius:8px;padding:20px 16px;text-align:center;transition:all 0.2s;cursor:pointer;"
             onmouseover="this.style.boxShadow='0 4px 12px rgba(64,158,255,0.15)';this.style.borderColor='#409EFF'"
             onmouseout="this.style.boxShadow='none';this.style.borderColor='#EBEEF5'">
            <i class="{{ tool.icon }} fa-2x" style="color:{{ tool.color }};margin-bottom:10px;display:block;"></i>
            <div style="font-weight:600;font-size:15px;margin-bottom:4px;">{{ tool.name }}</div>
            <div style="font-size:12px;color:#909399;">{{ tool.desc }}</div>
            <div style="margin-top:10px;">
                <span class="tag" style="font-size:11px;color:#67C23A;background:#f0f9eb;border:1px solid #e1f3d8;">{{ tool.count }} 次执行</span>
            </div>
        </div>
    </a>
    {% empty %}
    <div style="width:100%;text-align:center;padding:40px;color:#909399;">暂无工具</div>
    {% endfor %}
</div>

<div class="table-card">
    <div style="padding:14px 16px;font-weight:600;font-size:15px;border-bottom:1px solid #EBEEF5;">工具列表</div>
    <table class="table">
        <thead>
            <tr>
                <th style="width:50px;">ID</th>
                <th style="width:100px;">工具类型</th>
                <th style="width:120px;">创建时间</th>
                <th style="width:140px;">料号</th>
                <th style="width:60px;">版本</th>
                <th style="width:130px;">输出文件</th>
                <th style="width:70px;">执行人</th>
                <th style="width:120px;">制作时间</th>
                <th style="width:120px;">制作完成时间</th>
                <th style="width:60px;">耗时</th>
                <th style="width:100px;">失败原因</th>
                <th style="width:70px;">状态</th>
                <th style="width:80px;">更新人</th>
                <th style="width:130px;">更新时间</th>
                <th style="width:140px;">操作</th>
            </tr>
        </thead>
        <tbody id="executionTable">
            <tr><td colspan="15"><div class="empty-state"><p>加载中...</p></div></td></tr>
        </tbody>
    </table>
    <div class="pagination-bar" id="execPagination"></div>
</div>

<script>
var statusColor = {pending:'#E6A23C', running:'#409EFF', completed:'#67C23A', failed:'#F56C6C', cancelled:'#909399', recycled:'#C0C4CC'};
var statusName = {pending:'等待中', running:'执行中', completed:'已完成', failed:'失败', cancelled:'已取消', recycled:'已回收'};
var execPage = 1, execPageSize = 10;

function loadExecutions() {
    var kw = document.getElementById('searchKeyword').value.trim();
    var tp = document.getElementById('searchType').value;
    var url = '/api/tools/executions/?page_size=' + execPageSize + '&page=' + execPage;
    if(tp) url += '&tool__tool_type=' + tp;
    if(kw) url += '&search=' + kw;
    fetch(url)
        .then(r => r.json()).then(function(d) {
            var tb = document.getElementById('executionTable');
            if (d.results && d.results.length) {
                tb.innerHTML = d.results.map(function(e) {
                    return '<tr>'
                        + '<td>' + e.id + '</td>'
                        + '<td>' + (e.tool_name || '-') + '</td>'
                        + '<td>' + (e.created_at ? new Date(e.created_at).toLocaleString('zh-CN') : '-') + '</td>'
                        + '<td>' + (e.material_no || '-') + '</td>'
                        + '<td>' + (e.material_version || '-') + '</td>'
                        + '<td style="font-size:11px;">' + ((e.output_files && e.output_files.length) ? e.output_files.join('<br>') : '-') + '</td>'
                        + '<td>' + (e.executor_name || '-') + '</td>'
                        + '<td>' + (e.started_at ? new Date(e.started_at).toLocaleString('zh-CN') : '-') + '</td>'
                        + '<td>' + (e.completed_at ? new Date(e.completed_at).toLocaleString('zh-CN') : '-') + '</td>'
                        + '<td>' + (e.duration ? e.duration + 's' : '-') + '</td>'
                        + '<td style="color:#F56C6C;font-size:11px;">' + (e.failure_reason || (e.error_message ? e.error_message.substring(0,20) : '-')) + '</td>'
                        + '<td><span class="tag" style="color:' + (statusColor[e.status] || '#909399') + ';font-size:11px;">' + (statusName[e.status] || e.status) + '</span></td>'
                        + '<td>' + (e.updated_by_name || '-') + '</td>'
                        + '<td>' + (e.updated_at ? new Date(e.updated_at).toLocaleString('zh-CN') : '-') + '</td>'
                        + '<td>' + getActionButtons(e) + '</td>'
                        + '</tr>';
                }).join('');
                renderExecPagination(d.count);
            } else { tb.innerHTML = '<tr><td colspan="15"><div class="empty-state"><p>暂无记录</p></div></td></tr>'; document.getElementById('execPagination').innerHTML = ''; }
        });
}

function renderExecPagination(total) {
    var bar = document.getElementById('execPagination');
    var totalPages = Math.ceil(total / execPageSize);
    if (totalPages <= 1) { bar.innerHTML = ''; return; }
    var html = '<div>共 <strong>' + total + '</strong> 条</div><div class="pagination">';
    if (execPage > 1) html += '<button class="page-btn" onclick="goExecPage(' + (execPage - 1) + ')">上一页</button>';
    html += '<span class="page-btn active">' + execPage + ' / ' + totalPages + '</span>';
    if (execPage < totalPages) html += '<button class="page-btn" onclick="goExecPage(' + (execPage + 1) + ')">下一页</button>';
    html += '</div>';
    bar.innerHTML = html;
}

function goExecPage(p) { execPage = p; loadExecutions(); }

function doSearch() { execPage = 1; loadExecutions(); }
function doReset() { document.getElementById('searchKeyword').value=''; document.getElementById('searchType').value=''; execPage = 1; loadExecutions(); }

function getActionButtons(e) {
    var btns = '<div style="display:flex;gap:4px;white-space:nowrap;">';
    btns += '<button class="btn btn-success btn-sm" onclick="viewOutputs(' + e.id + ')"><i class="fas fa-file-alt"></i> 输出</button>';
    btns += '<button class="btn btn-primary btn-sm" onclick="updateExecution(' + e.id + ')"><i class="fas fa-edit"></i> 更新</button>';
    if (e.status !== 'recycled') {
        btns += '<button class="btn btn-sm" style="background:#909399;color:#fff;" onclick="recycleExecution(' + e.id + ')"><i class="fas fa-recycle"></i> 回收</button>';
    }
    btns += '</div>';
    return btns;
}

function cancelExecution(id) {
    if (!confirm('确定取消此执行？')) return;
    showLoading('取消中...');
    fetch('/api/tools/executions/' + id + '/cancel/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()}
    }).then(r => r.json()).then(d => {
        hideLoading();
        if (d.status) { loadExecutions(); }
        else { alert('取消失败'); }
    }).catch(function(err) {
        hideLoading();
        alert('请求失败');
        console.error(err);
    });
}

function recycleExecution(id) {
    if (!confirm('确定回收此执行记录？')) return;
    showLoading('回收中...');
    fetch('/api/tools/executions/' + id + '/recycle/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()}
    }).then(r => r.json()).then(d => {
        hideLoading();
        if (d.status) { loadExecutions(); }
        else { alert('回收失败：' + (d.error || '未知错误')); }
    }).catch(function(err) {
        hideLoading();
        alert('请求失败');
        console.error(err);
    });
}

function updateExecution(id) {
    if (!confirm('确认更新此执行记录？')) return;
    showLoading('更新中...');
    fetch('/api/tools/executions/' + id + '/update_execution/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()}
    }).then(r => r.json()).then(d => {
        hideLoading();
        if (d.success) { alert('更新成功！'); loadExecutions(); }
        else { alert('更新失败：' + (d.error || '未知错误')); }
    }).catch(function(err) {
        hideLoading();
        alert('请求失败');
        console.error(err);
    });
}

function reExecute(toolId, materialId) {
    if (!confirm('确定重新执行此工具？')) return;
    showLoading('执行中...');
    fetch('/api/tools/' + toolId + '/execute/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()},
        body: JSON.stringify({material_id: materialId})
    }).then(r => r.json()).then(d => {
        hideLoading();
        if (d.success) { alert('执行成功！执行ID：' + d.execution_id); loadExecutions(); }
        else { alert('执行失败：' + (d.error || '未知错误')); }
    }).catch(function(err) {
        hideLoading();
        alert('请求失败');
        console.error(err);
    });
}

function viewOutputs(id) {
    showLoading('加载输出...');
    fetch('/api/tools/executions/' + id + '/outputs/')
        .then(r => r.json()).then(d => {
            hideLoading();
            if (d.length) {
                var msg = d.map(function(o) { return '[' + o.output_type_display + '] ' + o.name; }).join('\n');
                alert('执行 #' + id + ' 的输出：\n\n' + msg);
            } else {
                alert('暂无输出');
            }
        }).catch(function(err) {
            hideLoading();
            alert('加载失败');
            console.error(err);
        });
}

function getCsrf() { var m = document.cookie.match(/csrftoken=([^;]+)/); return m ? m[1] : ''; }
loadExecutions();
</script>
{% endblock %}
