<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 飞针测试资料管理系统 V2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #409EFF 0%, #337ECC 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .login-box {
            background: #fff;
            border-radius: 8px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .login-box h3 {
            text-align: center;
            color: #409EFF;
            margin-bottom: 8px;
            font-size: 22px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #909399;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .login-box .form-control {
            height: 42px;
            font-size: 14px;
        }
        .login-box .btn {
            height: 42px;
            font-size: 15px;
        }
        .error-msg { color: #F56C6C; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>飞针测试资料管理系统</h3>
        <p class="subtitle">V2.0</p>
        
        {% if form.errors %}
        <div class="error-msg">用户名或密码错误</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">登 录</button>
        </form>
        
        <div style="margin-top:20px;padding:12px;background:#f5f7fa;border-radius:4px;font-size:12px;color:#909399;">
            <strong>测试账号：</strong><br>
            管理员：admin / admin123<br>
            工程师：zhangsan / pass123<br>
            操作员：lisi / pass123
        </div>
    </div>
</body>
</html>
