<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}工程资料管理系统 V2.0{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 本地化方案：下载 bootstrap.min.css 到 static/css/ 并替换上方 CDN 为 /static/css/bootstrap.min.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 本地化方案：下载 all.min.css + webfonts/ 到 static/ 并替换上方 CDN 为 /static/css/all.min.css -->
    <style>
        :root {
            --primary: #409EFF;
            --success: #67C23A;
            --warning: #E6A23C;
            --danger: #F56C6C;
            --info: #909399;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #EBEEF5;
            --text: #303133;
            --text-secondary: #606266;
            --text-placeholder: #C0C4CC;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
        }
        
        /* 顶部标题栏 */
        .header {
            background: linear-gradient(135deg, #409EFF 0%, #337ECC 100%);
            color: #fff;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h2 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        .header-right .badge-role {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 4px;
        }
        
        /* 侧边栏 */
        .layout {
            display: flex;
            min-height: calc(100vh - 56px);
        }
        .sidebar {
            width: 220px;
            background: #304156;
            color: #bfcbd9;
            flex-shrink: 0;
        }
        .sidebar .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 14px;
            text-decoration: none;
            color: #bfcbd9;
        }
        .sidebar .menu-item:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }
        .sidebar .menu-item.active {
            color: var(--primary);
            background: #263445;
            border-left-color: var(--primary);
        }
        .sidebar .menu-item i {
            width: 20px;
            margin-right: 10px;
            text-align: center;
        }
        
        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-x: auto;
        }
        
        /* 筛选卡片 */
        .filter-card {
            background: var(--white);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-item label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .filter-item input,
        .filter-item select {
            height: 36px;
            padding: 0 12px;
            border: 1px solid #DCDFE6;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }
        .filter-item input:focus,
        .filter-item select:focus {
            border-color: var(--primary);
        }
        .filter-item input { width: 200px; }
        .filter-item select { width: 150px; }
        
        .btn {
            height: 36px;
            padding: 0 20px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: #66b1ff; }
        .btn-default {
            background: #fff;
            color: var(--text-secondary);
            border: 1px solid #DCDFE6;
        }
        .btn-default:hover { color: var(--primary); border-color: var(--primary); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #85ce61; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #f78989; }
        .btn-sm { height: 28px; padding: 0 12px; font-size: 12px; }
        
        /* 状态标签栏 */
        .status-tabs {
            background: var(--white);
            border-radius: 6px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            padding: 0;
        }
        .status-tab {
            padding: 12px 24px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .status-tab:hover { color: var(--primary); }
        .status-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }
        .status-tab .count {
            margin-left: 4px;
            font-size: 12px;
            color: var(--info);
        }
        .status-tab.active .count { color: var(--primary); }
        
        /* 表格 */
        .table-card {
            background: var(--white);
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .table thead th {
            background: #f5f7fa;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .table tbody td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .table tbody tr:hover { background: #f5f7fa; }
        
        /* 状态标签 */
        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
        }
        .tag-未制作 { color: #F56C6C; background: #fef0f0; border: 1px solid #fbc4c4; }
        .tag-制作中 { color: #E6A23C; background: #fdf6ec; border: 1px solid #f5dab1; }
        .tag-已完成 { color: #67C23A; background: #f0f9eb; border: 1px solid #c2e7b0; }
        .tag-已审核 { color: #409EFF; background: #ecf5ff; border: 1px solid #b3d8ff; }
        .tag-已驳回 { color: #F56C6C; background: #fef0f0; border: 1px solid #fbc4c4; }
        
        /* 链接按钮 */
        .link-btn {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            background: none;
            border: none;
            padding: 0;
        }
        .link-btn:hover { text-decoration: underline; }
        .link-btn + .link-btn { margin-left: 10px; }
        
        /* 分页 */
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .pagination {
            display: flex;
            gap: 4px;
            list-style: none;
        }
        .pagination .page-btn {
            min-width: 32px;
            height: 32px;
            padding: 0 8px;
            border: 1px solid #DCDFE6;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }
        .pagination .page-btn:hover { color: var(--primary); border-color: var(--primary); }
        .pagination .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .pagination .page-btn.disabled {
            color: #C0C4CC;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* 弹出菜单 */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-toggle { cursor: pointer; }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-placeholder);
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; }
        
        /* 分页大小选择器 */
        .page-size { margin-left: 8px; }
        .page-size select {
            height: 32px;
            border: 1px solid #DCDFE6;
            border-radius: 4px;
            padding: 0 8px;
            font-size: 13px;
        }
        
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="header">
        <h2><i class="fas fa-bolt"></i> 工程资料管理系统 V2.0</h2>
        <div class="header-right">
            <span class="badge-role">{{ user.get_role_display }}</span>
            <span>{{ user.username }}</span>
            <span>|</span>
            <a href="/logout/" style="color:#fff;text-decoration:none;">退出</a>
        </div>
    </div>
    
    <div class="layout">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <a href="/" class="menu-item {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-home"></i> 首页
            </a>
            <a href="/materials/" class="menu-item {% if 'material' in request.path %}active{% endif %}">
                <i class="fas fa-folder-open"></i> 资料总纲
            </a>
            <a href="/tools/" class="menu-item {% if 'tool' in request.path %}active{% endif %}">
                <i class="fas fa-tools"></i> 工具管理
            </a>
            <a href="/reports/" class="menu-item {% if 'report' in request.path %}active{% endif %}">
                <i class="fas fa-chart-bar"></i> 报表管理
            </a>
            {% if user.role == 'admin' %}
            <a href="/users/" class="menu-item {% if 'user' in request.path %}active{% endif %}">
                <i class="fas fa-users"></i> 用户管理
            </a>
            <a href="/system/" class="menu-item {% if 'system' in request.path %}active{% endif %}">
                <i class="fas fa-cog"></i> 系统设置
            </a>
            {% endif %}
        </div>
        
        <!-- 主内容 -->
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <div style="text-align:center;padding:16px;color:#909399;font-size:12px;border-top:1px solid #EBEEF5;margin-top:20px;">
        工程资料管理系统 V2.0 &nbsp;|&nbsp; 作者：何瑞鹏 &nbsp;|&nbsp; © 2026
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- 本地化方案：下载 jquery-3.7.0.min.js 到 static/js/ 并替换上方 CDN 为 /static/js/jquery-3.7.0.min.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 本地化方案：下载 bootstrap.bundle.min.js 到 static/js/ 并替换上方 CDN 为 /static/js/bootstrap.bundle.min.js -->
    <script>
    /* 通用工具函数 */
    function showLoading(msg) {
        msg = msg || '加载中...';
        var el = document.getElementById('loading-overlay');
        if (!el) {
            el = document.createElement('div');
            el.id = 'loading-overlay';
            el.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:9999;display:flex;align-items:center;justify-content:center;';
            el.innerHTML = '<div style="background:#fff;padding:24px 40px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);"><span style="margin-left:8px;font-size:14px;color:#303133;">' + msg + '</span></div>';
            document.body.appendChild(el);
        }
        el.style.display = 'flex';
    }
    function hideLoading() {
        var el = document.getElementById('loading-overlay');
        if (el) el.style.display = 'none';
    }
    function escapeHtml(text) {
        var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
        return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
    }
    function getCsrf() {
        var m = document.cookie.match(/csrftoken=([^;]+)/);
        return m ? m[1] : '';
    }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
