{% extends 'base.html' %}
{% block title %}首页 - 工程资料管理系统 V2.0{% endblock %}

{% block content %}
<!-- 统计卡片 -->
<div class="filter-card" style="display:flex;gap:20px;flex-wrap:wrap;">
    <div style="flex:1;min-width:180px;text-align:center;padding:20px;border-right:1px solid #EBEEF5;">
        <div style="font-size:32px;font-weight:700;color:#409EFF;" id="totalCount">-</div>
        <div style="color:#909399;font-size:13px;margin-top:4px;">资料总数</div>
    </div>
    <div style="flex:1;min-width:180px;text-align:center;padding:20px;border-right:1px solid #EBEEF5;">
        <div style="font-size:32px;font-weight:700;color:#67C23A;" id="completedCount">-</div>
        <div style="color:#909399;font-size:13px;margin-top:4px;">已完成</div>
    </div>
    <div style="flex:1;min-width:180px;text-align:center;padding:20px;border-right:1px solid #EBEEF5;">
        <div style="font-size:32px;font-weight:700;color:#E6A23C;" id="unmadeCount">-</div>
        <div style="color:#909399;font-size:13px;margin-top:4px;">未制作</div>
    </div>
    <div style="flex:1;min-width:180px;text-align:center;padding:20px;border-right:1px solid #EBEEF5;">
        <div style="font-size:32px;font-weight:700;color:#909399;" id="todayCount">-</div>
        <div style="color:#909399;font-size:13px;margin-top:4px;">今日新增</div>
    </div>
    <div style="flex:1;min-width:180px;text-align:center;padding:20px;">
        <div style="font-size:32px;font-weight:700;color:#409EFF;" id="toolCount">-</div>
        <div style="color:#909399;font-size:13px;margin-top:4px;">工具执行次数</div>
    </div>
</div>

<!-- 快捷入口 -->
<div class="filter-card" style="display:flex;gap:12px;">
    <a href="/materials/" class="btn btn-primary"><i class="fas fa-list"></i> 资料总纲</a>
    <a href="/tools/" class="btn btn-success"><i class="fas fa-tools"></i> 工具输出</a>
    <a href="/reports/" class="btn btn-default"><i class="fas fa-chart-bar"></i> 报表管理</a>
</div>

<!-- 最近资料 -->
<div class="table-card">
    <div style="padding:14px 16px;font-weight:600;font-size:15px;border-bottom:1px solid #EBEEF5;">
        <i class="fas fa-clock" style="color:#409EFF;"></i> 最近资料
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>序号</th><th>流水ID</th><th>厂区ID</th><th>料号</th>
                <th>版本编码</th><th>REMARK</th><th>创建时间</th><th>制作人</th><th>状态</th>
            </tr>
        </thead>
        <tbody id="recentTable">
            <tr><td colspan="9"><div class="empty-state"><p>加载中...</p></div></td></tr>
        </tbody>
    </table>
</div>

<script>
fetch('/api/core/dashboard-stats/')
    .then(r => r.json())
    .then(d => {
        document.getElementById('totalCount').textContent = d.material_stats?.total || 0;
        document.getElementById('completedCount').textContent = d.material_stats?.completed || 0;
        document.getElementById('unmadeCount').textContent = d.material_stats?.unmade || 0;
        document.getElementById('todayCount').textContent = d.material_stats?.today || 0;
        document.getElementById('toolCount').textContent = d.tool_stats?.total || 0;
    });

fetch('/api/materials/?page_size=6&ordering=-created_at')
    .then(r => r.json())
    .then(d => {
        const tbody = document.getElementById('recentTable');
        if (d.results?.length) {
            tbody.innerHTML = d.results.map((m, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${m.serial_no}</td>
                    <td>${m.factory_name || m.factory || '-'}</td>
                    <td>${m.material_no}</td>
                    <td>${m.version_code}</td>
                    <td>${m.remark || 'None'}</td>
                    <td>${new Date(m.created_at).toLocaleString('zh-CN')}</td>
                    <td>${m.maker_name || m.creator_name || 'None'}</td>
                    <td><span class="tag tag-${m.status_display}">${m.status_display}</span></td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fas fa-inbox"></i><p>暂无数据</p></div></td></tr>';
        }
    });
</script>
{% endblock %}
