{% extends 'base.html' %}
{% block title %}报表管理{% endblock %}

{% block content %}
<div class="filter-card">
    <div class="filter-row">
        <div class="filter-item"><label>关键字：</label><input type="text" id="searchKeyword" placeholder="报表名称"></div>
        <div class="filter-item">
            <label>类型：</label>
            <select id="searchType">
                <option value="">全部</option>
                <option value="summary">汇总报表</option>
                <option value="detail">明细报表</option>
                <option value="statistical">统计报表</option>
                <option value="analysis">分析报表</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="doSearch()">查询</button>
        <button class="btn btn-default" onclick="doReset()">重置</button>
        <button class="btn btn-success" onclick="generateNew()">生成报表</button>
    </div>
</div>

<div class="table-card">
    <div style="padding:14px 16px;font-weight:600;font-size:15px;border-bottom:1px solid #EBEEF5;">报表列表</div>
    <table class="table">
        <thead>
            <tr>
                <th>报表名称</th>
                <th style="width:100px;">类型</th>
                <th style="width:100px;">分类</th>
                <th>描述</th>
                <th style="width:100px;">创建人</th>
                <th style="width:150px;">更新时间</th>
                <th style="width:130px;">操作</th>
            </tr>
        </thead>
        <tbody id="reportTable">
            <tr><td colspan="7"><div class="empty-state"><p>加载中...</p></div></td></tr>
        </tbody>
    </table>
</div>

<!-- 最近生成的报表实例 -->
<div class="filter-card" style="display:flex;align-items:center;justify-content:space-between;margin:16px 0;">
    <h3 style="margin:0;font-size:16px;color:#303133;">
        <i class="fas fa-history" style="color:#E6A23C;"></i> 生成记录
    </h3>
</div>
<div class="table-card">
    <table class="table">
        <thead>
            <tr>
                <th>报表名称</th>
                <th>实例名称</th>
                <th style="width:90px;">状态</th>
                <th style="width:80px;">行数</th>
                <th style="width:100px;">生成人</th>
                <th style="width:160px;">生成时间</th>
                <th style="width:100px;">操作</th>
            </tr>
        </thead>
        <tbody id="instanceTable">
            <tr><td colspan="7"><div class="empty-state"><p>加载中...</p></div></td></tr>
        </tbody>
    </table>
</div>

<script>
var typeName = {summary:'汇总报表', detail:'明细报表', statistical:'统计报表', analysis:'分析报表', custom:'自定义报表'};
function loadReports() {
    var p = new URLSearchParams();
    var kw = document.getElementById('searchKeyword').value.trim();
    var tp = document.getElementById('searchType').value;
    if(kw) p.set('search', kw);
    if(tp) p.set('report_type', tp);
    fetch('/api/reports/?' + p.toString())
        .then(r => r.json()).then(function(d) {
            var tb = document.getElementById('reportTable');
            if (d.results && d.results.length) {
                tb.innerHTML = d.results.map(function(r) {
                    return '<tr><td><strong>'+r.name+'</strong></td><td><span class="tag" style="color:#409EFF;background:#ecf5ff;border:1px solid #b3d8ff;">'+ (typeName[r.report_type] || r.report_type) +'</span></td><td>'+ (r.category_name || '-') +'</td><td style="color:#909399;">'+ (r.description || '-') +'</td><td>'+ (r.created_by_name || '-') +'</td><td>'+ new Date(r.updated_at).toLocaleString('zh-CN') +'</td><td><a href="/reports/'+r.id+'/" class="link-btn">详情</a> <a href="javascript:void(0)" class="link-btn" onclick="genOne('+r.id+')">生成</a></td></tr>';
                }).join('');
            } else { tb.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>暂无报表</p></div></td></tr>'; }
        });
}
function loadInstances() {
    fetch('/api/reports/instances/?page_size=20')
        .then(r => r.json()).then(function(d) {
            var tb = document.getElementById('instanceTable');
            var colors = {pending:'#E6A23C', completed:'#67C23A', failed:'#F56C6C'};
            var names = {pending:'生成中', completed:'已完成', failed:'失败'};
            if (d.results && d.results.length) {
                tb.innerHTML = d.results.map(function(i) {
                    var dlBtn = i.file ? '<a href="'+i.file+'" class="link-btn" style="color:#67C23A;" download><i class="fas fa-download"></i> 下载</a>' : '-';
                    return '<tr><td>'+ (i.report_name || '-') +'</td><td>'+i.name+'</td><td><span class="tag" style="color:'+(colors[i.status]||'#909399')+'">'+ (names[i.status]||i.status) +'</span></td><td>'+ (i.row_count||0) +'</td><td>'+ (i.generated_by_name||'-') +'</td><td>'+ (i.generated_at ? new Date(i.generated_at).toLocaleString('zh-CN') : '-') +'</td><td>'+dlBtn+'</td></tr>';
                }).join('');
            } else { tb.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>暂无生成记录</p></div></td></tr>'; }
        });
}
function generateNew() {
    var rptId = prompt('请输入要生成的报表ID（可从上方报表列表查看）');
    if (!rptId) return;
    genOne(rptId);
}
function genOne(id) {
    if (!confirm('确定生成此报表？')) return;
    fetch('/api/reports/' + id + '/generate/', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-CSRFToken':getCsrf()},
        body: JSON.stringify({})
    }).then(r => r.json()).then(function(d) {
        if (d.success) { alert('生成成功！实例ID：' + d.instance_id + ' 文件：' + (d.file_url || '无')); loadReports(); loadInstances(); }
        else { alert('生成失败：' + (d.error || '未知错误')); }
    });
}
function doSearch() { loadReports(); }
function doReset() { document.getElementById('searchKeyword').value=''; document.getElementById('searchType').value=''; loadReports(); }
function getCsrf() { var m = document.cookie.match(/csrftoken=([^;]+)/); return m ? m[1] : ''; }
loadReports(); loadInstances();
</script>
{% endblock %}
